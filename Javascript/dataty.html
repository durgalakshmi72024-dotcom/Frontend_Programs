<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
</head>

<body>
        <script>

                // string

                let Topic;
                Topic = "JavaScript"

                console.log(Topic);
                console.log(typeof Topic);


                //Boolean

                const type = true
                console.log(type)
                console.log(typeof type)

                // Number

                let PhoneNumber;
                PhoneNumber = 7339039847

                console.log(PhoneNumber);
                console.log(typeof PhoneNumber);

                // NULL

                const _method = null
                console.log(typeof _method);

                // ARRAY

                var Names = ["Jk", "Tae", "Jimin"]
                console.log(Names, "array Names");
                console.log(typeof Names, "array type");

                // UNDEFINED

                var age
                console.log(age);


                // OBJECT

                const datas = {
                        Name: "Durga",
                        Email: "durgalakshmi72024@gmail.com",
                }

                console.log(datas)
                console.log(typeof datas);


        </script>
</body>

</html>
