<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // ARITHEMATIC OPERATOR

        let a = 5, b = 19
        console.log(a, b)
        console.log(a + b)
        console.log(a - b)
        console.log(a * b)
        console.log(a / b)
        a++
        console.log(a)
        b--
        console.log(b)

        // ASSIGNMENT OPERATOR

        let c = 30, d = 10
        console.log(c += 20)
        console.log(d -= 30)

        // LOGICAL OPERATOR

        var g = 8, h = 15

        // AND

        console.log(g > 20 && h < 40)
        console.log(g < 10 && h < 20)

        // OR

        console.log(g > 20 || h > 40)
        console.log(g < 10 || h < 20)

        // NOT

        console.log(!(g > 20 && h < 40))
        console.log(!(g < 10 && h < 20))

        //   COMPARISON OPERATOR

        console.log(10 == "20")
        console.log(10 == "10")
        console.log(10 != "20")
        console.log(10 != "10")
        console.log(10 !== "20")
        console.log(10 !== 10)
        console.log(10 === "20")
        console.log(10 === 10)
        console.log(10 < 20)
        console.log(10 > 20)
        console.log(10 <= 20)
        console.log(10 >= 20)
        
    </script>
</body>

</html>
