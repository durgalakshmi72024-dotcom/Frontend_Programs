    <script>

        //1. Write a program to print numbers from 1 to 10 using a for loop.

        for(let i=1;i<=10;i++){
            console.log(i);
             }

        // 2. Write a program to print even numbers from 1 to 20 using a for loop.

        for(i=1;i<=20;i++){
            if(i%2==0){
                console.log(i);
                }
            }

        // 3. Write a program to print odd numbers from 1 to 20 using a for loop.
        
        for(i=1;i<=20;i++){
            if(i%2!==0){
                console.log(i);
                }
        }

        //4. Write a program to print numbers from 10 to 1 in reverse order

        for(i=10;i>=1;i--){
            console.log(i);
            }

        // 5.Write a program to print the square of each number from 1 to 10

        for(i=1;i<=10;i++){
            console.log(i**2);
            }

        //  6. Write a program to print the divisible of 5 up to 50.

        for(i=1;i<=50;i++){
            if(i%5==0){
                console.log(i);
                }
        }

        //  7.Write a program to find the sum of numbers from 1 to 10.

        var sum=0
        for(i=1;i<=10;i++){
            sum=sum+i;
            console.log(sum);   
        }

        // 8.Write a program to find the sum of even numbers from 1 to 20.

        var sum=0
        for(i=1;i<=20;i++){
            if(i%2==0){
            sum=sum+i;
            console.log(sum);   
        }
        }

        // 9.Write a program to find the sum of odd numbers from 1 to 20.

        var sum=0
        for(i=1;i<=20;i++){
            if(i%2!==0){
            sum=sum+i;
            console.log(sum);   
        }
        }

        // 10. Write a program to print the multiplication table of 7.

        for(i = 1;i<= 10;i++) {
            console.log(i*7);
        }

         // 11. Write a program to print the divisible of 3 up to 30.

        for(i=1;i<=30;i++){
            if(i%3==0){
                console.log(i);
                }
        }

         //  12. Write a program to find the factorial of 5 using a for loop.

        var fact = 1
        for (i = 1; i <= 5; i++) {
            fact= fact*i;
            console.log(fact);
        }
        
        // 13. Write a program to print numbers from 1 to n

        var n=19
        for(i=1;i<=n;i++){
            console.log(i);
        }
